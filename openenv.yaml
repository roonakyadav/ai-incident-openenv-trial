name: ai-incident-openenv
version: "1.0.0"
description: >
  OpenEnv environment for evaluating AI agents on distributed system
  incident response. Agents diagnose and recover multi-service failures
  by reasoning over logs, alerts, and metrics across 3 tasks of
  increasing difficulty.
tags:
  - openenv
  - incident-response
  - sre
  - devops
  - multi-step-reasoning

tasks:
  - id: easy-auth-down
    difficulty: easy
    max_steps: 5
    success_threshold: 0.6
    description: Single auth service failure. Restart the correct service.

  - id: medium-payments-degraded
    difficulty: medium
    max_steps: 8
    success_threshold: 0.6
    description: >
      Payments service degraded under high load.
      Scale and stabilize before error rate breaches SLA.

  - id: hard-bad-deployment
    difficulty: hard
    max_steps: 10
    success_threshold: 0.6
    description: >
      Auth failure from bad deployment. Misleading DB logs.
      Only rollback_service fully resolves it.

  - id: hard-cascading-failure
    difficulty: hard
    max_steps: 10
    success_threshold: 0.6
    description: >
      Critical DB dependency causing cascading failure across auth and payments.
      Multi-step reasoning required to identify and fix root cause.

  - id: hard-cascading-ambiguous
    difficulty: hard
    max_steps: 15
    success_threshold: 0.6
    description: >
      Both auth and payments degraded. Shared DB dependency causes
      re-degradation if wrong service fixed first. Order of actions matters.

  - id: hard-latent-root-cause 
    difficulty: hard 
    max_steps: 12 
    success_threshold: 0.6 
    description: > 
      Latent root cause in payments causes auth degradation. 
      Misleading logs implicate auth. Delayed failure if wrong fix applied. 

action_space:
  type: structured
  schema:
    action_type: string (enum of 10 values)
    target: string (optional)
  actions:
    - restart_service
    - rollback_service
    - isolate_service
    - check_logs
    - check_metrics
    - scale_service
    - drain_traffic
    - restore_traffic
    - optimize_db
    - escalate

observation_space:
  - services: list of service state objects
  - logs: list of recent log strings
  - alerts: list of active alert strings
  - system_health: float [0.0, 1.0]
  - system_stability: float [0.0, 1.0]
  - system_strain: float [0.0, 1.0]
  - time_step: integer

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
